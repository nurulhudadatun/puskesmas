<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKP Digital - Puskesmas Wanareja 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-3xl mx-auto p-4 md:p-6">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-extrabold text-emerald-800">SISTEM PKP DIGITAL</h1>
            <p class="text-slate-600 text-sm">Puskesmas Wanareja 2 - Tahun 2026</p>
        </header>

        <!-- Tab Navigasi -->
        <div class="flex space-x-1 bg-slate-200 p-1 rounded-lg mb-6">
            <button onclick="bukaTab('klaster2')" class="flex-1 py-2 text-xs font-bold bg-white rounded-md shadow">Klaster 2</button>
            <button onclick="bukaTab('klaster3')" class="flex-1 py-2 text-xs font-bold bg-white rounded-md shadow">Klaster 3</button>
            <button onclick="bukaTab('klaster4')" class="flex-1 py-2 text-xs font-bold bg-white rounded-md shadow">Klaster 4</button>
        </div>

        <!-- Kontainer Form -->
        <form id="form-container" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 id="title-klaster" class="text-lg font-bold text-emerald-700 mb-4 border-b pb-2">Klaster 2 (Ibu & Anak)</h2>
            <div id="list-indikator" class="space-y-4">
                <!-- Indikator akan muncul otomatis di sini -->
            </div>
            <button type="submit" class="mt-6 w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition">Simpan Data Inputan</button>
        </form>
    </div>

    <script>
        const dataPKP = {
            klaster2: [
                "Cakupan ANC TM 1 USG", "Cakupan K4", "Cakupan ANC TM III USG", 
                "Cakupan K6", "Persentase Ibu hamil dengan Anemia", 
                "Ibu hamil mendapatkan 90 tablet tambah darah", 
                "Ibu bersalin mendapatkan pelayanan standar (PF)", 
                "Ibu Nifas pelayanan standar (KF4)", "Status imunisasi T2+ Ibu Hamil", 
                "Ibu Hamil KEK mendapat PMT", "Ibu hamil Anemia dirujuk ke FKRTL"
            ],
            klaster3: [
                "Skrining kesehatan usia produktif", "Skrining kesehatan usia sekolah", 
                "Pelayanan kesehatan usia dewasa", "Skrining Lansia", 
                "Pelayanan kesehatan Lansia", "Edukasi kesehatan jiwa"
            ],
            klaster4: [
                "Terduga TBC diperiksa standar", "Pengobatan TBC", 
                "Pelayanan kesehatan HIV", "Pelayanan kesehatan IMS", 
                "Penemuan kasus DBD", "Angka Bebas Jentik"
            ]
        };

        function bukaTab(k) {
            const list = document.getElementById('list-indikator');
            const title = document.getElementById('title-klaster');
            list.innerHTML = '';
            title.innerText = k.toUpperCase().replace('KLASTER', 'KLASTER ');
            
            dataPKP[k].forEach((ind, index) => {
                list.innerHTML += `
                    <div class="flex flex-col">
                        <label class="text-xs font-semibold text-slate-500 mb-1">${ind}</label>
                        <input type="number" placeholder="0" class="w-full border-b-2 border-emerald-200 focus:border-emerald-500 outline-none p-1">
                    </div>
                `;
            });
        }

        // Jalankan Klaster 2 saat pertama kali dibuka
        window.onload = () => bukaTab('klaster2');
    </script>
</body>
</html>
